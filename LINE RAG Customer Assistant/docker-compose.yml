services:
  assistant:
    build: .
    container_name: moomhom-line-rag
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Cache the embedding model across restarts
      - hf_cache:/app/.hf_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  hf_cache:
